version: "2"
run:
  go: 1.26.1
linters:
  default: none
  enable:
    - errcheck
    - gocritic
    - gocyclo
    - govet
    - ineffassign
    - misspell
    - staticcheck
    - unconvert
    - unused
  settings:
    gocritic:
      disabled-checks:
        - ifElseChain
        - wrapperFunc
        - sloppyReassign
        - rangeValCopy
      enabled-tags:
        - diagnostic
        - performance
    gocyclo:
      min-complexity: 32
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/NVIDIA/fleet-intelligence-agent
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
