image:
  repository: ghcr.io/nvidia/fleet-intelligence-agent
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

hostPID: true
runtimeClassName: nvidia

securityContext:
  privileged: true
  runAsUser: 0
  runAsGroup: 0

env:
  DCGM_URL: nvidia-dcgm.gpu-operator.svc:5555
  DCGM_URL_IS_UNIX_SOCKET: "false"
  FLEETINT_COLLECT_INTERVAL: "1m"
  FLEETINT_INCLUDE_METRICS: "true"
  FLEETINT_INCLUDE_EVENTS: "true"
  FLEETINT_INCLUDE_MACHINEINFO: "true"
  FLEETINT_INCLUDE_HEALTHCHECKS: "true"
  FLEETINT_METRICS_LOOKBACK: "1m"
  FLEETINT_EVENTS_LOOKBACK: "1m"
  FLEETINT_CHECK_INTERVAL: "1m"
  FLEETINT_RETRY_MAX_ATTEMPTS: "3"
  FLEETINT_ATTESTATION_JITTER_ENABLED: "true"
  FLEETINT_ATTESTATION_INTERVAL: "24h"
  HTTP_PROXY: ""
  HTTPS_PROXY: ""

logLevel: warn
listenAddress: 0.0.0.0:15133
components: all
deployEnv: prod

# Enrollment init container — only used in bare metal (direct) mode.
# In gateway mode (otelGateway.enabled=true) no enrollment is needed: the gateway
# owns all backend auth, and agents send OTLP to the gateway without credentials.
#
# Bare metal (otelGateway.enabled=false):
#   Agents enroll directly with the backend using a SAK token + customer ID.
#   Requires: enroll.endpoint, enroll.customerID, and either enroll.tokenValue
#   (the SAK) or enroll.tokenSecretName (a K8s Secret holding the SAK).
enroll:
  enabled: false
  unenroll: false
  force: false
  endpoint: ""
  customerID: ""
  tokenSecretName: ""
  tokenSecretKey: "token"
  tokenValue: ""

ports:
  http: 15133

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
    ephemeral-storage: "1Gi"
  requests:
    cpu: "100m"
    memory: "256Mi"
    ephemeral-storage: "256Mi"

# Node selector for targeting GPU nodes.
# By default, only deploy to nodes with NVIDIA GPUs.
# This is a standard label set by the NVIDIA GPU Operator/Device Plugin.
# To deploy without label restriction, set to {} and override.
nodeSelector:
  nvidia.com/gpu.present: "true"

tolerations: []
affinity: {}

serviceAccount:
  create: true
  name: ""
  automountToken: false

# OTel gateway collector deployed alongside the agents in the same cluster.
# When enabled:
#   - A Deployment + Service for the fleetint-otelcol collector is created.
#   - Each agent enrolls via the gateway proxy (no credentials on agent pods).
#     The gateway authenticates with its SAK and returns a JWT to the agent.
#     Customer identity (Nv-Actor-Id) is extracted from the JWT's assertion.customer_id claim.
#   - Each agent sends OTLP to the gateway via FLEETINT_COLLECTOR_ENDPOINT.
#   - The gateway authenticates outbound requests to the backend via its JWT.
#   - Agent identity flows through OTLP resource attributes (machine.id, GPU UUIDs).
otelGateway:
  enabled: false

  image:
    repository: ghcr.io/nvidia/fleetint-otelcol
    tag: "0.0.1"
    pullPolicy: IfNotPresent

  replicas: 1

  # Enrollment credentials for gateway→backend authentication.
  # The gateway is the only component that holds these; agents never see them.
  enroll:
    # endpoint is the backend enrollment URL.
    # Example: https://backend/api/v1/health/enroll
    endpoint: ""
    # sakToken is the Service API Key used to authenticate with the API gateway
    # on enrollment. Stored in a Kubernetes Secret; never put in plain values files.
    # Use --set otelGateway.enroll.sakToken=nvapi-... or reference an existingSecret.
    sakToken: ""
    # existingSecret: if set, SAK_TOKEN is read from this secret instead of
    # creating one from sakToken. The secret must have a key named "sak-token".
    existingSecret: ""

  # Backend OTLP HTTP base URL (e.g. https://backend/api/v1/health).
  backendEndpoint: ""

  service:
    port: 4318

  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"
