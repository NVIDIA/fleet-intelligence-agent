image:
  repository: ghcr.io/nvidia/fleet-intelligence-agent
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

hostPID: true
runtimeClassName: nvidia

securityContext:
  privileged: true
  runAsUser: 0
  runAsGroup: 0

env:
  DCGM_URL: nvidia-dcgm.gpu-operator.svc:5555
  DCGM_URL_IS_UNIX_SOCKET: "false"
  MALLOC_ARENA_MAX: 4
  FLEETINT_COLLECT_INTERVAL: "1m"
  FLEETINT_INCLUDE_METRICS: "true"
  FLEETINT_INCLUDE_EVENTS: "true"
  FLEETINT_INCLUDE_MACHINEINFO: "true"
  FLEETINT_INCLUDE_HEALTHCHECKS: "true"
  FLEETINT_METRICS_LOOKBACK: "1m"
  FLEETINT_EVENTS_LOOKBACK: "1m"
  FLEETINT_CHECK_INTERVAL: "1m"
  FLEETINT_RETRY_MAX_ATTEMPTS: "3"
  FLEETINT_INVENTORY_ENABLED: "true"
  FLEETINT_INVENTORY_INTERVAL: "1h"
  FLEETINT_ATTESTATION_ENABLED: "true"
  FLEETINT_ATTESTATION_INITIAL_INTERVAL: "5m"
  FLEETINT_ATTESTATION_INTERVAL: "24h"
  HTTP_PROXY: ""
  HTTPS_PROXY: ""

logLevel: warn
listenAddress: 127.0.0.1:15133
retentionPeriod: 24h
components: all

enroll:
  enabled: false
  unenroll: false
  force: false
  endpoint: ""
  tokenSecretName: ""
  tokenSecretKey: "token"
  tokenValue: ""

ports:
  http: 15133

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
    ephemeral-storage: "1Gi"
  requests:
    cpu: "100m"
    memory: "256Mi"
    ephemeral-storage: "256Mi"

# Node selector restricts the agent to nodes where DCGM is deployed.
# The agent requires a running DCGM HostEngine to collect GPU metrics,
# so it must run on the same nodes as DCGM.
# This label is automatically set by the NVIDIA GPU Operator when DCGM is enabled.
# To override, set nodeSelector to a different label or {} to remove the restriction.
nodeSelector:
  nvidia.com/gpu.deploy.dcgm: "true"

tolerations: []
affinity: {}

serviceAccount:
  create: true
  name: ""
  automountToken: false
