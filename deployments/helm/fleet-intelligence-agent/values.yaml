image:
  repository: ghcr.io/nvidia/fleet-intelligence-agent
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

hostPID: true
runtimeClassName: nvidia

securityContext:
  privileged: true
  runAsUser: 0
  runAsGroup: 0

env:
  DCGM_URL: nvidia-dcgm.gpu-operator.svc:5555
  DCGM_URL_IS_UNIX_SOCKET: "false"
  FLEETINT_COLLECT_INTERVAL: "1m"
  FLEETINT_INCLUDE_METRICS: "true"
  FLEETINT_INCLUDE_EVENTS: "true"
  FLEETINT_INCLUDE_MACHINEINFO: "true"
  FLEETINT_INCLUDE_HEALTHCHECKS: "true"
  FLEETINT_METRICS_LOOKBACK: "1m"
  FLEETINT_EVENTS_LOOKBACK: "1m"
  FLEETINT_CHECK_INTERVAL: "1m"
  FLEETINT_RETRY_MAX_ATTEMPTS: "3"
  FLEETINT_ATTESTATION_JITTER_ENABLED: "true"
  FLEETINT_ATTESTATION_INTERVAL: "24h"
  HTTP_PROXY: ""
  HTTPS_PROXY: ""

logLevel: warn
listenAddress: 0.0.0.0:15133
components: all
deployEnv: prod

# Enrollment init container — runs fleetint enroll before the agent starts.
# Required for both bare metal and K8s gateway deployments.
#
# Bare metal (otelGateway.enabled=false):
#   Agents enroll directly with the backend using endpoint + token (SAK).
#   Requires: enroll.endpoint, enroll.tokenValue or enroll.tokenSecretName.
#
# K8s gateway (otelGateway.enabled=true):
#   Agents enroll via the gateway proxy — no SAK needed on agent pods.
#   endpoint/token values are ignored; only enroll.enabled=true is required.
enroll:
  enabled: false
  unenroll: false
  endpoint: ""
  tokenSecretName: ""
  tokenSecretKey: "token"
  tokenValue: ""

ports:
  http: 15133

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
    ephemeral-storage: "1Gi"
  requests:
    cpu: "100m"
    memory: "256Mi"
    ephemeral-storage: "256Mi"

# Node selector for targeting GPU nodes.
# By default, only deploy to nodes with NVIDIA GPUs.
# This is a standard label set by the NVIDIA GPU Operator/Device Plugin.
# To deploy without label restriction, set to {} and override.
nodeSelector:
  nvidia.com/gpu.present: "true"

tolerations: []
affinity: {}

serviceAccount:
  create: true
  name: ""
  automountToken: false

# OTel gateway collector deployed alongside the agents in the same cluster.
# When enabled:
#   - A Deployment + Service for the fleetint-otelcol collector is created.
#   - Each agent enrolls via the gateway proxy (no SAK on agent pods).
#     The gateway uses its SAK to call the backend and returns a JWT to the agent.
#     The agent stores the JWT locally — on pod restart it skips re-enrollment.
#   - Each agent sends OTLP to the gateway via FLEETINT_COLLECTOR_ENDPOINT.
#   - The gateway authenticates outbound requests to the backend via its own SAK→JWT.
#   - Agent identity flows through OTLP resource attributes (machine.id, GPU UUIDs).
otelGateway:
  enabled: false

  image:
    repository: ghcr.io/nvidia/fleetint-otelcol
    tag: "0.0.1"
    pullPolicy: IfNotPresent

  replicas: 1

  # SAK credentials for gateway→backend authentication.
  # The gateway is the only component that holds the SAK; agents never see it.
  sak:
    # enrollEndpoint is the backend enrollment URL.
    # Example: https://backend/api/v1/health/enroll
    enrollEndpoint: ""
    token:
      # Provide either secretName (reference an existing Secret) or value (creates one).
      secretName: ""
      secretKey: "sak-token"
      value: ""

  # Backend OTLP HTTP base URL (e.g. https://backend/api/v1/health).
  backendEndpoint: ""

  service:
    port: 4318

  # Enrollment proxy: agents POST here to get a JWT without needing a SAK.
  enrollProxy:
    port: 4319

  resources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "100m"
      memory: "128Mi"
