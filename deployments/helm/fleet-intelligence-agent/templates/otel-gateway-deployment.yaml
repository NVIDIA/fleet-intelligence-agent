{{- if .Values.otelGateway.enabled }}
{{- if and (not .Values.otelGateway.enroll.sakToken) (not .Values.otelGateway.enroll.existingSecret) }}
{{- fail "otelGateway.enroll.sakToken or otelGateway.enroll.existingSecret is required when otelGateway.enabled=true" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fleet-intelligence-agent.fullname" . }}-otel-gateway
  labels:
    {{- include "fleet-intelligence-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-gateway
spec:
  replicas: {{ .Values.otelGateway.replicas }}
  selector:
    matchLabels:
      {{- include "fleet-intelligence-agent.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: otel-gateway
  template:
    metadata:
      labels:
        {{- include "fleet-intelligence-agent.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: otel-gateway
      annotations:
        # Force pod restart when the collector config changes.
        checksum/config: {{ include (print $.Template.BasePath "/otel-gateway-configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: otel-gateway
          image: "{{ .Values.otelGateway.image.repository }}:{{ .Values.otelGateway.image.tag }}"
          imagePullPolicy: {{ .Values.otelGateway.image.pullPolicy }}
          args:
            - --config=/etc/otelcol/config.yaml
          env:
            - name: BACKEND_ENDPOINT
              value: {{ required "otelGateway.backendEndpoint is required when otelGateway.enabled=true" .Values.otelGateway.backendEndpoint | quote }}
            - name: ENROLL_ENDPOINT
              value: {{ required "otelGateway.enroll.endpoint is required when otelGateway.enabled=true" .Values.otelGateway.enroll.endpoint | quote }}
            - name: SAK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.otelGateway.enroll.existingSecret | default (printf "%s-otel-gateway-sak" (include "fleet-intelligence-agent.fullname" .)) }}
                  key: sak-token
          ports:
            - name: otlp-http
              containerPort: {{ .Values.otelGateway.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.otelGateway.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "fleet-intelligence-agent.fullname" . }}-otel-gateway
{{- end }}
