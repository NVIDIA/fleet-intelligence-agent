{{- if .Values.otelGateway.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fleet-intelligence-agent.fullname" . }}-otel-gateway
  labels:
    {{- include "fleet-intelligence-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-gateway
spec:
  type: ClusterIP
  selector:
    {{- include "fleet-intelligence-agent.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: otel-gateway
  ports:
    - name: otlp-http
      port: {{ .Values.otelGateway.service.port }}
      targetPort: otlp-http
      protocol: TCP
{{- end }}
