{{- if .Values.otelGateway.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fleet-intelligence-agent.fullname" . }}-otel-gateway
  labels:
    {{- include "fleet-intelligence-agent.labels" . | nindent 4 }}
data:
  config.yaml: |
    extensions:
      # SAK→JWT auth for outbound backend requests. Automatically refreshes
      # the JWT on 401 responses without restarting the collector.
      sakauth:
        enroll_endpoint: ${env:SAK_ENROLL_ENDPOINT}
        sak_token: ${env:SAK_TOKEN}
        enroll_proxy_port: {{ .Values.otelGateway.enrollProxy.port }}
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      otlp:
        protocols:
          http:
            # No inbound auth: the gateway is a ClusterIP service accessible only
            # within the cluster. Agents send their enrollment JWT in the
            # Authorization header, but it is not checked here — cluster network
            # isolation is the security boundary. The gateway uses its own SAK
            # JWT when forwarding to the backend. Agent identity flows through
            # OTLP resource attributes (machine.id, GPU UUIDs) in the payload.
            endpoint: 0.0.0.0:{{ .Values.otelGateway.service.port }}

    processors:
      memory_limiter:
        check_interval: 5s
        limit_mib: 400
        spike_limit_mib: 100
      batch:
        timeout: 10s
        send_batch_size: 1000

    exporters:
      otlphttp/backend:
        endpoint: ${env:BACKEND_ENDPOINT}
        auth:
          authenticator: sakauth
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 30s
          max_elapsed_time: 300s
        sending_queue:
          enabled: true
          num_consumers: 4
          queue_size: 1000

    service:
      extensions: [sakauth, health_check]
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlphttp/backend]
        logs:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlphttp/backend]
      telemetry:
        logs:
          level: warn
{{- end }}
