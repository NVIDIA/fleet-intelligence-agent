{{- if and .Values.otelGateway.enabled (not .Values.otelGateway.enroll.existingSecret) }}
{{- if not .Values.otelGateway.enroll.sakToken }}
{{- fail "otelGateway.enroll.sakToken or otelGateway.enroll.existingSecret is required when otelGateway.enabled=true" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "fleet-intelligence-agent.fullname" . }}-otel-gateway-sak
  labels:
    {{- include "fleet-intelligence-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: otel-gateway
type: Opaque
stringData:
  sak-token: {{ .Values.otelGateway.enroll.sakToken | quote }}
{{- end }}
