{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ default (include "gpuhealth-agent.fullname" .) .Values.serviceAccount.name }}
  labels:
    {{- include "gpuhealth-agent.labels" . | nindent 4 }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountToken }}
{{- end }}

