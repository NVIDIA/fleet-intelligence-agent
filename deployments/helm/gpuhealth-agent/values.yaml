image:
  repository: nvcr.io/0753215517602916/agent-artifact/gpuhealth-agent
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: nvcr-pull-secret

hostPID: true
runtimeClassName: nvidia

securityContext:
  privileged: true
  runAsUser: 0
  runAsGroup: 0

env:
  DCGM_URL: nvidia-dcgm.gpu-operator.svc:5555
  DCGM_URL_IS_UNIX_SOCKET: "false"
  GPUHEALTH_COLLECT_INTERVAL: "1m"
  GPUHEALTH_INCLUDE_METRICS: "true"
  GPUHEALTH_INCLUDE_EVENTS: "true"
  GPUHEALTH_INCLUDE_MACHINEINFO: "true"
  GPUHEALTH_INCLUDE_HEALTHCHECKS: "true"
  GPUHEALTH_METRICS_LOOKBACK: "1m"
  GPUHEALTH_EVENTS_LOOKBACK: "1m"
  GPUHEALTH_CHECK_INTERVAL: "1m"
  GPUHEALTH_RETRY_MAX_ATTEMPTS: "3"
  GPUHEALTH_ATTESTATION_JITTER_ENABLED: "true"
  GPUHEALTH_ATTESTATION_INTERVAL: "24h"
  HTTP_PROXY: ""
  HTTPS_PROXY: ""

logLevel: warn
listenAddress: 0.0.0.0:15133
components: all

enroll:
  enabled: false
  endpoint: ""
  tokenSecretName: ""
  tokenSecretKey: "token"
  tokenValue: ""

ports:
  http: 15133

resources:
  limits:
    cpu: "500m"
    memory: "512Mi"
    ephemeral-storage: "1Gi"
  requests:
    cpu: "100m"
    memory: "256Mi"
    ephemeral-storage: "256Mi"

# Node selector for targeting GPU nodes.
# By default, only deploy to nodes with NVIDIA GPUs.
# This is a standard label set by the NVIDIA GPU Operator/Device Plugin.
# To deploy without label restriction, set to {} and override.
nodeSelector:
  nvidia.com/gpu.present: "true"

tolerations: []
affinity: {}

serviceAccount:
  create: true
  name: ""
  automountToken: false
