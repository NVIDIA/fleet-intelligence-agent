# Project identification
sonar.projectKey=SW-Cloud_GPU-Health_GPU-Health_gpu_health_agent
sonar.projectName=GPU Health Agent
sonar.projectVersion=1.0

# Quality Gate - Wait for quality gate result (blocks pipeline if quality gate fails)
sonar.qualitygate.wait=true

# Source code
sonar.sources=.
sonar.exclusions=**/*_test.go,**/mock_*.go

# Test sources
sonar.tests=.
sonar.test.inclusions=**/*_test.go
sonar.test.exclusions=**/vendor/**

# Go specific settings
sonar.sourceEncoding=UTF-8
sonar.go.coverage.reportPaths=coverage/coverage.out

# Coverage exclusions
sonar.coverage.exclusions=**/cmd/gpuhealth/**,**/docs/**,**/routes/**,**/testutil/**,**/*_test.go,**/mock_*.go,**/internal/server/**

