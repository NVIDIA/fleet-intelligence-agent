# GoReleaser configuration for NVIDIA GPU Health Agent
# See https://goreleaser.com for documentation
#
# Usage:
#   goreleaser build --snapshot --clean      # Test build
#   goreleaser release --snapshot --clean    # Create packages without releasing
#   goreleaser release --clean               # Full release (requires git tag)
#
# Prerequisites for private GitLab dependencies:
#   - SSH key configured for gitlab-master.nvidia.com:12051
#   - Access to gpu-health/gpud repository
#
# Prerequisites for ARM64 cross-compilation:
#   - sudo apt-get install gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

version: 2

# Global environment variables for private GitLab access
env:
  - GOPRIVATE=gitlab-master.nvidia.com/*
  - GONOPROXY=gitlab-master.nvidia.com/*
  - GONOSUMDB=gitlab-master.nvidia.com/*

# Git configuration for private repository access
before:
  hooks:
    - git config --global url."ssh://git@gitlab-master.nvidia.com:12051/".insteadOf "https://gitlab-master.nvidia.com/"

# Build configuration
builds:
  - id: gpuhealth
    main: ./cmd/gpuhealth
    binary: gpuhealth
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=1
    ldflags:
      - -s -w
      - -X github.com/NVIDIA/gpuhealth/internal/version.Version={{.Version}}
      - -X github.com/NVIDIA/gpuhealth/internal/version.Revision={{.FullCommit}}
      - -X github.com/NVIDIA/gpuhealth/internal/version.BuildTimestamp={{.Date}}
      - -X github.com/NVIDIA/gpuhealth/internal/version.Package=github.com/NVIDIA/gpuhealth
    # Cross-compilation setup for CGO
    overrides:
      - goos: linux
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=aarch64-linux-gnu-gcc
          - CXX=aarch64-linux-gnu-g++

# Archive configuration
archives:
  - id: gpuhealth-archive
    name_template: "gpuhealth-{{ .Os }}-{{ if eq .Arch \"amd64\" }}x86_64{{ else if eq .Arch \"arm64\" }}sbsa{{ else }}{{ .Arch }}{{ end }}-{{ .Version }}"
    wrap_in_directory: gpuhealth
    files:
      - NOTICE
      - LICENSE
      - src: deployments/packages/systemd/gpuhealthd.service
        dst: systemd/gpuhealthd.service
      - src: deployments/packages/systemd/gpuhealth.env
        dst: env/gpuhealth

# Linux package configuration
nfpms:
  - id: gpuhealth-deb
    package_name: gpuhealth
    file_name_template: "gpuhealth_{{ .Version }}_{{ if eq .Arch \"amd64\" }}amd64{{ else if eq .Arch \"arm64\" }}arm64{{ else }}{{ .Arch }}{{ end }}"
    vendor: NVIDIA Corporation
    homepage: https://github.com/NVIDIA/gpuhealth
    maintainer: NVIDIA GPU Health Team
    description: |
      NVIDIA GPU Health Agent - Lightweight GPU health monitoring and reporting agent
      for NVIDIA GPU infrastructure.
    section: utils
    priority: optional
    formats:
      - deb
    dependencies:
      - systemd
    recommends:
      - datacenter-gpu-manager-4-core
    suggests:
      - nvidia-driver-535 | nvidia-driver-545 | nvidia-driver-550
    bindir: /usr/bin
    contents:
      # License and notices
      - src: NOTICE
        dst: /usr/share/doc/gpuhealth/NOTICE
      # SystemD service file
      - src: deployments/packages/systemd/gpuhealthd.service
        dst: /usr/lib/systemd/system/gpuhealthd.service
        type: config|noreplace
      # Environment configuration
      - src: deployments/packages/systemd/gpuhealth.env
        dst: /etc/default/gpuhealth
        type: config|noreplace
      # Data directory
      - dst: /var/lib/gpuhealth
        type: dir
        file_info:
          mode: 0755
    scripts:
      preinstall: deployments/packages/scripts/preinst
      postinstall: deployments/packages/scripts/postinst
      preremove: deployments/packages/scripts/prerm
      postremove: deployments/packages/scripts/postrm

  - id: gpuhealth-rpm
    package_name: gpuhealth
    file_name_template: "gpuhealth-{{ .Version }}-1.{{ if eq .Arch \"amd64\" }}x86_64{{ else if eq .Arch \"arm64\" }}aarch64{{ else }}{{ .Arch }}{{ end }}"
    vendor: NVIDIA Corporation
    homepage: https://github.com/NVIDIA/gpuhealth
    maintainer: NVIDIA GPU Health Team
    description: |
      NVIDIA GPU Health Agent - Lightweight GPU health monitoring and reporting agent
      for NVIDIA GPU infrastructure.
    section: Applications/System
    formats:
      - rpm
    dependencies:
      - systemd
    recommends:
      - datacenter-gpu-manager-4-core
    suggests:
      - nvidia-driver >= 535
    bindir: /usr/bin
    contents:
      # License and notices
      - src: NOTICE
        dst: /usr/share/doc/gpuhealth/NOTICE
      # SystemD service file
      - src: deployments/packages/systemd/gpuhealthd.service
        dst: /usr/lib/systemd/system/gpuhealthd.service
        type: config|noreplace
      # Environment configuration (RPM uses /etc/default like Debian)
      - src: deployments/packages/systemd/gpuhealth.env
        dst: /etc/default/gpuhealth
        type: config|noreplace
      # Data directory
      - dst: /var/lib/gpuhealth
        type: dir
        file_info:
          mode: 0755
    scripts:
      preinstall: deployments/packages/scripts/preinst
      postinstall: deployments/packages/scripts/postinst
      preremove: deployments/packages/scripts/prerm
      postremove: deployments/packages/scripts/postrm

# Checksum configuration
checksum:
  name_template: 'checksums.txt'

# Snapshot configuration
# Snapshot builds get a suffix with commit hash
# These are for testing only and NOT uploaded to Artifactory/kitmaker
snapshot:
  version_template: "{{ incpatch .Version }}-{{ .ShortCommit }}"

# GitHub release configuration
release:
  github:
    owner: NVIDIA
    name: gpuhealth
  header: |
    ## NVIDIA GPU Health Agent v{{.Version}}
    
    This release includes GPU health monitoring and reporting capabilities for NVIDIA GPU infrastructure.
    
    ### Available Packages
    
    - **DEB packages**: `amd64` and `arm64` for Debian/Ubuntu systems
    - **RPM packages**: `x86_64` and `aarch64` for RHEL/CentOS/Fedora systems  
    - **Binary archives**: Standalone binaries for both architectures
    
    ### Installation
    
    Download the appropriate package for your system from the assets below. For installation instructions, see the project README.
    
  footer: |    
    ### Verification
    
    All release artifacts are checksummed. Verify downloads using:
    ```bash
    sha256sum -c checksums.txt
    ```
    
    ### Support
    
    For issues and questions, please visit: https://github.com/NVIDIA/gpuhealth/issues
  draft: false
  prerelease: auto  # Auto-detect pre-release based on version (e.g., v1.0.0-beta)
  mode: replace  # Replace existing release if it exists
  skip_upload: false

# Changelog configuration
changelog:
  sort: asc
  use: git
  groups:
    - title: 'New Features'
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: 'Bug Fixes'
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 1
    - title: 'Performance Improvements'
      regexp: "^.*perf[(\\w)]*:+.*$"
      order: 2
    - title: 'Documentation Updates'
      regexp: "^.*docs[(\\w)]*:+.*$"
      order: 3
    - title: 'Other Changes'
      order: 999
  filters:
    exclude:
      - '^test:'
      - '^ci:'
      - '^build:'
      - '^style:'
      - '^chore:'
      - Merge pull request
      - Merge branch
