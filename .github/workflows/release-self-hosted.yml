name: Release with Self-Hosted Runners

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (leave empty for latest commit)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-packages:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Ubuntu 22.04 DEB packages
          - runner: gpuhealth-ubuntu-22.04-x86
            os_name: ubuntu-22.04
            arch: amd64
            package_type: deb
            goreleaser_config: .goreleaser_gpuhealth_deb_amd64.yaml
            build_deps: "build-essential"
            
          - runner: gpuhealth-ubuntu-22.04-arm
            os_name: ubuntu-22.04
            arch: arm64
            package_type: deb
            goreleaser_config: .goreleaser_gpuhealth_deb_arm64.yaml
            build_deps: "build-essential"
            
          # RHEL 8 RPM packages  
          - runner: gpuhealth-rhel-8-x86
            os_name: rhel-8
            arch: amd64
            package_type: rpm
            goreleaser_config: .goreleaser_gpuhealth_rpm_x86_64.yaml
            build_deps: "gcc gcc-c++ make"
            
          - runner: gpuhealth-rhel-8-arm
            os_name: rhel-8
            arch: aarch64
            package_type: rpm
            goreleaser_config: .goreleaser_gpuhealth_rpm_aarch64.yaml
            build_deps: "gcc gcc-c++ make"

    name: Build ${{ matrix.package_type }} for ${{ matrix.os_name }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for proper versioning
          
      - name: Install build dependencies (Ubuntu)
        if: contains(matrix.os_name, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.build_deps }} linux-headers-$(uname -r)
          
      - name: Install build dependencies (RHEL)
        if: contains(matrix.os_name, 'rhel')
        run: |
          sudo dnf update -y
          sudo dnf groupinstall -y "Development Tools"
          sudo dnf install -y ${{ matrix.build_deps }} kernel-headers kernel-devel
          
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          
      - name: Verify Go installation
        run: |
          go version
          go env GOOS GOARCH
          
      - name: Install GoReleaser
        run: |
          go install github.com/goreleaser/goreleaser@latest
          goreleaser --version
          
      - name: Validate GoReleaser config
        run: |
          goreleaser check --config ${{ matrix.goreleaser_config }}
          
      - name: Run GoReleaser
        run: |
          goreleaser release --config ${{ matrix.goreleaser_config }} --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package_type }}-${{ matrix.os_name }}-${{ matrix.arch }}
          path: |
            dist/*.deb
            dist/*.rpm
          retention-days: 7
          
      - name: List generated artifacts
        run: |
          echo "Generated artifacts:"
          find dist/ -name "*.deb" -o -name "*.rpm" | head -20

  # Collect all artifacts and create unified release  
  create-release:
    needs: build-packages
    runs-on: ubuntu-latest
    if: always() && (needs.build-packages.result == 'success')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          
      - name: Organize artifacts
        run: |
          mkdir -p ./release-assets
          find ./artifacts -name "*.deb" -exec cp {} ./release-assets/ \;
          find ./artifacts -name "*.rpm" -exec cp {} ./release-assets/ \;
          ls -la ./release-assets/
          
      - name: Get tag information
        id: tag_info
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.tag }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG=${GITHUB_REF#refs/tags/}
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "release_name=gpuhealth-${TAG}" >> $GITHUB_OUTPUT
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_info.outputs.tag }}
          name: ${{ steps.tag_info.outputs.release_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ./release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Release Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** ${{ steps.tag_info.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Packages Built:**" >> $GITHUB_STEP_SUMMARY
          echo "  - Ubuntu 22.04 DEB (amd64, arm64)" >> $GITHUB_STEP_SUMMARY  
          echo "  - RHEL 8 RPM (x86_64, aarch64)" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifacts:** $(ls ./release-assets/ | wc -l) packages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Package List:" >> $GITHUB_STEP_SUMMARY
          for file in ./release-assets/*; do
            echo "- $(basename $file)" >> $GITHUB_STEP_SUMMARY
          done
