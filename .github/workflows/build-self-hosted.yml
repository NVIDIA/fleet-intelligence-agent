name: Build and Test with Self-Hosted Runners

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Lint on a single runner (fastest)
  lint:
    name: Lint and Static Analysis
    runs-on: gpuhealth-ubuntu-22.04-x86
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential linux-headers-$(uname -r)
          
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.61.0
        
      - name: Build custom golangci-lint with nilaway
        run: golangci-lint custom
        
      - name: Run linter
        run: ./custom-gcl run --verbose --config=.golangci.yml ./...

  # Test on multiple platforms
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: gpuhealth-ubuntu-22.04-x86
            os_name: ubuntu-22.04
            arch: amd64
            
          - runner: gpuhealth-ubuntu-22.04-arm
            os_name: ubuntu-22.04
            arch: arm64
            
          - runner: gpuhealth-rhel-8-x86
            os_name: rhel-8
            arch: amd64
            
          - runner: gpuhealth-rhel-8-arm
            os_name: rhel-8
            arch: aarch64

    name: Test on ${{ matrix.os_name }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Install build dependencies (Ubuntu)
        if: contains(matrix.os_name, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential linux-headers-$(uname -r)
          
      - name: Install build dependencies (RHEL)
        if: contains(matrix.os_name, 'rhel')
        run: |
          sudo dnf update -y
          sudo dnf groupinstall -y "Development Tools"
          sudo dnf install -y gcc gcc-c++ make kernel-headers kernel-devel
          
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          
      - name: Verify environment
        run: |
          go version
          go env GOOS GOARCH
          gcc --version || true
          
      - name: Run unit tests
        run: |
          make test || go test -v ./...
          
      - name: Build binary
        run: |
          make gpuhealth || go build -o bin/gpuhealth ./cmd/gpuhealth
          
      - name: Test binary
        run: |
          ./bin/gpuhealth --version
          ./bin/gpuhealth --help
          
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os_name }}-${{ matrix.arch }}
          path: |
            bin/gpuhealth
            *.out
            coverage.html
          retention-days: 3

  # Build packages on PR for validation
  build-packages:
    if: github.event_name == 'pull_request'
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: gpuhealth-ubuntu-22.04-x86
            os_name: ubuntu-22.04
            arch: amd64
            goreleaser_config: .goreleaser_gpuhealth_deb_amd64.yaml
            
          - runner: gpuhealth-rhel-8-x86
            os_name: rhel-8
            arch: amd64
            goreleaser_config: .goreleaser_gpuhealth_rpm_x86_64.yaml

    name: Build Package Test on ${{ matrix.os_name }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Install build dependencies (Ubuntu)
        if: contains(matrix.os_name, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential linux-headers-$(uname -r)
          
      - name: Install build dependencies (RHEL)
        if: contains(matrix.os_name, 'rhel')
        run: |
          sudo dnf update -y
          sudo dnf groupinstall -y "Development Tools"
          sudo dnf install -y gcc gcc-c++ make kernel-headers kernel-devel
          
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          
      - name: Install GoReleaser
        run: |
          go install github.com/goreleaser/goreleaser@latest
          
      - name: Test package build (dry-run)
        run: |
          goreleaser build --config ${{ matrix.goreleaser_config }} --snapshot --clean
          
      - name: Upload package test artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-test-${{ matrix.os_name }}-${{ matrix.arch }}
          path: |
            dist/
          retention-days: 1
