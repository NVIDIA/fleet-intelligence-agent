name: CI - E2E Tests

on:
  push:
    branches: ["main"]
    tags: ['*.*.*']
  pull_request:
    paths:
      - ".github/workflows/ci-e2e-tests.yml"
      - "**.go"
      - "go.mod"
      - "go.sum"
    branches: ["**"]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E Tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          cache: true
          go-version-file: go.mod

      - name: Run E2E tests
        run: |
          echo "Running E2E tests on ubuntu-22.04 (GitHub-hosted)..."
          KMSG_FILE_PATH=/dev/null ./scripts/tests-e2e.sh

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            e2e/**/*.log
            **/*test.xml
            bin/
          if-no-files-found: warn
          retention-days: 7
