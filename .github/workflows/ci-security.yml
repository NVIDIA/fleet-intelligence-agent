name: CI - Security & Compliance

# Security scans always run on GitHub-hosted (platform-agnostic)
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["**"]
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6 AM

permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-22.04  # GitHub-hosted (security tools are platform-agnostic)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          cache: true
          go-version-file: go.mod

      - name: Run Gosec security scanner
        uses: securecodewarrior/github-action-gosec@master
        with:
          args: '-fmt sarif -out gosec.sarif ./...'
        
      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: gosec.sarif

      - name: Vulnerability scan with Nancy
        run: |
          go install github.com/sonatypeoss/nancy@latest
          go list -json -deps ./... | nancy sleuth

      - name: Check for known vulnerabilities
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: License compliance check
        run: |
          go install github.com/google/go-licenses@latest
          go-licenses check ./...
