name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

env:
  GO_VERSION: '1.24.11'
  GOPRIVATE: gitlab-master.nvidia.com/*
  GONOPROXY: gitlab-master.nvidia.com/*
  GONOSUMDB: gitlab-master.nvidia.com/*

jobs:
  secret-detection:
    name: Secret Detection
    runs-on: [self-hosted, rocky8]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history for comprehensive scanning

      - name: Set up Python
        run: |
          # Ensure Python and pip are available
          python3 --version
          pip3 --version

      - name: Install detect-secrets
        run: |
          # Install detect-secrets from PyPI with user flag to avoid permission issues
          pip3 install --user detect-secrets
          # Add user bin to PATH
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Run detect-secrets scan
        run: |
          # Scan for new secrets not in baseline
          echo "Scanning for secrets..."
          if detect-secrets scan --baseline .secrets.baseline --all-files; then
            echo "No new secrets detected!"
          else
            echo "New secrets detected!"
            echo "::error::New secrets found that are not in the baseline"
            echo ""
            echo "To fix this:"
            echo "1. Review the detected secrets above"
            echo "2. If they are false positives, run: detect-secrets scan --update .secrets.baseline"
            echo "3. If they are real secrets, remove them from the code"
            echo "4. Commit the updated .secrets.baseline file"
            exit 1
          fi

  lint:
    name: Lint
    runs-on: [self-hosted, rocky8]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Configure Git for private repositories
        run: |
          git config --global url."https://git:${{ secrets.GITLAB_TOKEN }}@gitlab-master.nvidia.com/".insteadOf "https://gitlab-master.nvidia.com/"

      - name: Download dependencies
        run: go mod download

      - name: Clean previous lint cache
        run: |
          rm -rf ~/.cache/golangci-lint || true
          mkdir -p ~/.cache/golangci-lint

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --timeout=5m

      - name: Run govulncheck
        run: make vuln

  unit_test:
    name: Unit Tests
    runs-on: [self-hosted, rocky8]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Configure Git for private repositories
        run: |
          git config --global url."https://git:${{ secrets.GITLAB_TOKEN }}@gitlab-master.nvidia.com/".insteadOf "https://gitlab-master.nvidia.com/"

      - name: Download dependencies
        run: go mod download

      - name: Clean previous test artifacts
        run: |
          rm -rf ./coverage || true
          mkdir -p ./coverage

      - name: Run unit tests
        run: make test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/coverage.out
          flags: unittests
          name: codecov-umbrella

  build_check:
    name: Build Check
    runs-on: [self-hosted, rocky8]
    needs: [lint]
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Configure Git for private repositories
        run: |
          git config --global url."https://git:${{ secrets.GITLAB_TOKEN }}@gitlab-master.nvidia.com/".insteadOf "https://gitlab-master.nvidia.com/"

      - name: Download dependencies
        run: go mod download

      - name: Clean previous build artifacts
        run: |
          rm -f gpuhealth-${{ matrix.goos }}-${{ matrix.goarch }} || true

      - name: Build all packages
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
          CXX: ${{ matrix.goarch == 'arm64' && 'aarch64-linux-gnu-g++' || 'g++' }}
        run: go build ./...

      - name: Smoke build main binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 1
          CC: ${{ matrix.goarch == 'arm64' && 'aarch64-linux-gnu-gcc' || 'gcc' }}
          CXX: ${{ matrix.goarch == 'arm64' && 'aarch64-linux-gnu-g++' || 'g++' }}
        run: go build -o gpuhealth-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/gpuhealth

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gpuhealth-${{ matrix.goos }}-${{ matrix.goarch }}
          path: gpuhealth-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 7

  sonarqube:
    name: SonarQube Analysis
    runs-on: [self-hosted, rocky8]
    needs: [unit_test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better relevancy of analysis

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Configure Git for private repositories
        run: |
          git config --global url."https://git:${{ secrets.GITLAB_TOKEN }}@gitlab-master.nvidia.com/".insteadOf "https://gitlab-master.nvidia.com/"

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests with coverage
        run: make test

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # Optional: Fail the job if the Quality Gate fails
      # Uncomment if you want to enforce quality gate in CI
      # - name: SonarQube Quality Gate check
      #   uses: SonarSource/sonarqube-quality-gate-action@v1
      #   timeout-minutes: 5
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  package_snapshot:
    name: Package Snapshot
    runs-on: [self-hosted, rocky8]
    needs: [unit_test, build_check]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Configure Git for private repositories
        run: |
          git config --global url."https://git:${{ secrets.GITLAB_TOKEN }}@gitlab-master.nvidia.com/".insteadOf "https://gitlab-master.nvidia.com/"

      - name: Download dependencies
        run: go mod download

      - name: Clean previous dist directory
        run: |
          rm -rf ./dist || true

      - name: Run GoReleaser snapshot
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: v2.4.1
          args: release --snapshot --clean --config .goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload snapshot packages
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-packages
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
            dist/checksums.txt
          retention-days: 7
